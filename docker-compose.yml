services:
  surrealdb:
    image: surrealdb/surrealdb:latest
    user: root
    command: start --log info --user root --pass root surrealkv:/data/sakha.db
    volumes:
      - surreal_data:/data
    healthcheck:
      test: ["CMD", "/surreal", "is-ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  product-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ./backend/.env
    environment:
      SURREAL_URL: ws://surrealdb:8000/rpc
      AUTH_API_BASE: http://auth-api:8001
    ports:
      - "8080:8080"
    depends_on:
      surrealdb:
        condition: service_healthy

  auth-api:
    build:
      context: ./surreal-auth-api/backend
      dockerfile: Dockerfile
    env_file: ./surreal-auth-api/backend/.env
    environment:
      SURREAL_URL: ws://surrealdb:8000/rpc
      APP_BASE_URL: http://localhost
      FRONTEND_BASE_URL: http://localhost
    ports:
      - "8001:8001"
    depends_on:
      surrealdb:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - product-api
      - auth-api

  startup-info:
    image: busybox
    depends_on:
      - frontend
    command: >
      sh -c "
        echo '';
        echo '========================================';
        echo '   Sakha Project is up and running!';
        echo '========================================';
        echo '';
        echo '  Frontend:    http://localhost';
        echo '  Product API: http://localhost:8080';
        echo '  Auth API:    http://localhost:8001';
        echo '  API Docs:    http://localhost:8080/docs';
        echo '';
        echo '========================================';
        echo ''
      "
    restart: "no"

volumes:
  surreal_data:
